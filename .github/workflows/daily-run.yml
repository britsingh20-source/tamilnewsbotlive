name: Tamil News Bot - Daily Run

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Tamil & Noto fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto fonts-noto-extra fonts-noto-ui-core \
            fonts-noto-color-emoji fonts-dejavu-core \
            fonts-lohit-taml libfontconfig1 \
            ffmpeg libsm6 libxext6 libgl1
          fc-cache -fv
          echo "=== Tamil font check ==="
          fc-list :lang=ta | head -10 || echo "No Tamil fonts listed yet"

      - name: Install Python dependencies
        run: |
          pip install requests gtts "moviepy==1.0.3" "Pillow>=10.0.0" \
            numpy openai "imageio==2.28.1" imageio-ffmpeg

      - name: Install Wav2Lip dependencies
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install librosa==0.9.2 opencv-python batch-face tqdm numba

      - name: Clone Wav2Lip & download checkpoint
        run: |
          git clone https://github.com/Rudrabha/Wav2Lip.git /tmp/Wav2Lip
          mkdir -p /tmp/Wav2Lip/checkpoints
          echo "Downloading Wav2Lip checkpoint..."
          wget -q --show-progress \
            "https://github.com/justinjohn0306/Wav2Lip/releases/download/models/wav2lip.pth" \
            -O /tmp/Wav2Lip/checkpoints/wav2lip.pth
          ls -lh /tmp/Wav2Lip/checkpoints/

      - name: Verify Wav2Lip setup
        run: |
          python -c "import torch; print('PyTorch:', torch.__version__)"
          python -c "import cv2; print('OpenCV:', cv2.__version__)"
          python -c "import librosa; print('Librosa:', librosa.__version__)"
          ls -lh /tmp/Wav2Lip/checkpoints/wav2lip.pth

      - name: Install SadTalker dependencies
        run: |
          pip install face_alignment==1.3.5 facexlib gfpgan kornia             scikit-image yacs pyyaml einops             "basicsr>=1.4.2" "realesrgan"
          pip install dlib || pip install dlib --no-build-isolation || echo "dlib optional - skip"

      - name: Clone SadTalker & download checkpoints
        run: |
          echo "=== Cloning SadTalker ==="
          git clone https://github.com/OpenTalker/SadTalker.git /tmp/SadTalker
          pip install -r /tmp/SadTalker/requirements.txt || true

          echo "=== Downloading SadTalker checkpoints ==="
          mkdir -p /tmp/SadTalker/checkpoints
          mkdir -p /tmp/SadTalker/gfpgan/weights

          # SadTalker main checkpoints
          wget -q --show-progress             "https://github.com/OpenTalker/SadTalker/releases/download/v0.0.2-rc/mapping_00109-model.pth.tar"             -O /tmp/SadTalker/checkpoints/mapping_00109-model.pth.tar
          wget -q --show-progress             "https://github.com/OpenTalker/SadTalker/releases/download/v0.0.2-rc/mapping_00229-model.pth.tar"             -O /tmp/SadTalker/checkpoints/mapping_00229-model.pth.tar
          wget -q --show-progress             "https://github.com/OpenTalker/SadTalker/releases/download/v0.0.2-rc/SadTalker_V0.0.2_256.safetensors"             -O /tmp/SadTalker/checkpoints/SadTalker_V0.0.2_256.safetensors
          wget -q --show-progress             "https://github.com/OpenTalker/SadTalker/releases/download/v0.0.2-rc/SadTalker_V0.0.2_512.safetensors"             -O /tmp/SadTalker/checkpoints/SadTalker_V0.0.2_512.safetensors

          # GFPGAN weights for face enhancement
          wget -q --show-progress             "https://github.com/xinntao/facexlib/releases/download/v0.1.0/detection_Resnet50_Final.pth"             -O /tmp/SadTalker/gfpgan/weights/detection_Resnet50_Final.pth
          wget -q --show-progress             "https://github.com/xinntao/facexlib/releases/download/v0.2.2/parsing_parsenet.pth"             -O /tmp/SadTalker/gfpgan/weights/parsing_parsenet.pth
          wget -q --show-progress             "https://github.com/TencentARC/GFPGAN/releases/download/v1.3.0/GFPGANv1.4.pth"             -O /tmp/SadTalker/gfpgan/weights/GFPGANv1.4.pth

          echo "=== SadTalker checkpoint sizes ==="
          ls -lh /tmp/SadTalker/checkpoints/
          ls -lh /tmp/SadTalker/gfpgan/weights/

      - name: Verify SadTalker setup
        run: |
          python -c "import face_alignment; print('face_alignment OK')" || echo "face_alignment WARN"
          python -c "import gfpgan; print('gfpgan OK')" || echo "gfpgan WARN"
          python -c "import kornia; print('kornia OK')" || echo "kornia WARN"
          ls /tmp/SadTalker/inference.py && echo "SadTalker inference.py: OK" || echo "SadTalker: MISSING"

      - name: Create output folders
        run: |
          mkdir -p tamil-news-bot-github_3/tamil-news-bot/output/audio
          mkdir -p tamil-news-bot-github_3/tamil-news-bot/output/videos
          mkdir -p tamil-news-bot-github_3/tamil-news-bot/logs
          mkdir -p tamil-news-bot-github_3/tamil-news-bot/assets

      - name: Run Tamil News Bot
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_BUSINESS_ID: ${{ secrets.IG_BUSINESS_ID }}
        run: python tamil-news-bot-github_3/tamil-news-bot/scripts/run_all.py

      - name: Show output files
        if: always()
        run: |
          echo "=== Videos ==="
          find tamil-news-bot-github_3/tamil-news-bot/output/videos -type f || echo "No videos"
          echo "=== Audio ==="
          find tamil-news-bot-github_3/tamil-news-bot/output/audio -type f || echo "No audio"

      - name: Upload videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tamil-news-videos-${{ github.run_number }}
          path: tamil-news-bot-github_3/tamil-news-bot/output/
          retention-days: 3

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: run-logs-${{ github.run_number }}
          path: tamil-news-bot-github_3/tamil-news-bot/logs/
          retention-days: 7
