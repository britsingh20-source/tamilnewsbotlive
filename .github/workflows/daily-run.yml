name: Tamil News Bot - Daily Run

'on':
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests gtts moviepy pillow numpy openai

      - name: Create output folders
        run: |
          mkdir -p tamil-news-bot/output/audio
          mkdir -p tamil-news-bot/output/videos
          mkdir -p tamil-news-bot/logs
          mkdir -p tamil-news-bot/assets

      - name: Run Tamil News Bot
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_BUSINESS_ID: ${{ secrets.IG_BUSINESS_ID }}
        run: python tamil-news-bot/scripts/run_all.py

      - name: Upload videos
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: tamil-news-videos-${{ github.run_number }}
          path: tamil-news-bot/output/videos/
          retention-days: 3

      - name: Upload logs
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: run-logs-${{ github.run_number }}
          path: tamil-news-bot/logs/
          retention-days: 7
